name: Auto Build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve latest upstream tag
        id: sync
        run: |
          git remote add upstream https://github.com/Auxilor/EcoBits.git || true
          git fetch upstream --tags

          UPSTREAM_TAG=$(git ls-remote --refs --tags upstream | awk -F/ '{print $3}' | sort -V | tail -n1)
          if [ -z "$UPSTREAM_TAG" ]; then
            echo "Could not resolve upstream tag."
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$UPSTREAM_TAG" > /dev/null 2>&1; then
            echo "Latest upstream tag ($UPSTREAM_TAG) already exists on origin. Skipping build and release."
            echo "has_update=false" >> $GITHUB_OUTPUT
          else
            echo "Building latest upstream tag: $UPSTREAM_TAG"
            git checkout --detach "tags/$UPSTREAM_TAG"
            echo "has_update=true" >> $GITHUB_OUTPUT
            echo "upstream_tag=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
          fi
        
      - name: Set up JDK 21
        if: steps.sync.outputs.has_update == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Upgrade Gradle
        if: steps.sync.outputs.has_update == 'true'
        run: ./gradlew wrapper --gradle-version 8.12.1

      - name: Patch dependencies and repositories
        if: steps.sync.outputs.has_update == 'true'
        run: |
          # 1. Fix PlaceholderAPI (PAPI) Version
          find . -name "build.gradle*" -exec sed -i 's/2.11.2/2.11.7/g' {} +

          # 2. Upgrade Shadow Plugin (Mandatory for Java 21)
          # Version 8.3.5 is the last major 8.x release and stable with Gradle 8.x
          find . -name "build.gradle*" -exec sed -i 's/com.github.johnrengelman.shadow/com.gradleup.shadow/g' {} +
          find . -name "build.gradle*" -exec sed -i 's/version "7.0.0"/version "8.3.5"/g' {} +
          find . -name "build.gradle*" -exec sed -i "s/version '7.0.0'/version '8.3.5'/g" {} +
          find . -name "build.gradle*" -exec sed -i 's/version "8.0.0"/version "8.3.5"/g' {} +
          find . -name "build.gradle*" -exec sed -i "s/version '8.0.0'/version '8.3.5'/g" {} +
          find . -name "build.gradle*" -exec sed -i 's/version "9.3.1"/version "8.3.5"/g' {} +
          find . -name "build.gradle*" -exec sed -i "s/version '9.3.1'/version '8.3.5'/g" {} +

          # 3. Upgrade Kotlin Plugin (Mandatory for Gradle 9+)
          # If upstream uses an old Kotlin version (e.g. 1.x), upgrade it to 2.1.0 to work with Gradle 9
          find . -name "build.gradle*" -exec sed -i 's/version "1.5.0"/version "2.1.0"/g' {} +
          find . -name "build.gradle*" -exec sed -i 's/version "1.6.0"/version "2.1.0"/g' {} +
          find . -name "build.gradle*" -exec sed -i 's/version "1.7.0"/version "2.1.0"/g' {} +
          find . -name "build.gradle*" -exec sed -i 's/version "1.8.0"/version "2.1.0"/g' {} +
          find . -name "build.gradle*" -exec sed -i 's/version "1.9.0"/version "2.1.0"/g' {} +
          find . -name "build.gradle*" -exec sed -i 's/kotlin("jvm") version "1.[0-9].[0-9]*"/kotlin("jvm") version "2.1.0"/g' {} +

          # 4. Inject Missing Repositories
          # Use a more robust check to add repos to both Groovy and Kotlin DSL
          for f in $(find . -name "build.gradle*"); do
            if ! grep -q "repo.extendedclip.com" "$f"; then
              sed -i '/repositories {/a \        maven { url = uri("https://repo.extendedclip.com/content/repositories/placeholderapi/") }' "$f"
            fi
            if ! grep -q "repo.helpch.at" "$f"; then
              sed -i '/repositories {/a \        maven { url = uri("https://repo.helpch.at/releases") }' "$f"
            fi
          done

      - name: Setup Gradle cache
        if: steps.sync.outputs.has_update == 'true'
        uses: gradle/actions/setup-gradle@v3

      - name: Get Project Version
        id: version
        if: steps.sync.outputs.has_update == 'true'
        run: |
          VERSION=$(grep '^version' gradle.properties | cut -d'=' -f2 | tr -d ' ' | tr -d '\r')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          echo "name=$VERSION (Auto Build)" >> $GITHUB_OUTPUT

      - name: Build
        if: steps.sync.outputs.has_update == 'true'
        run: ./gradlew clean build shadowJar --no-daemon

      - name: Verify artifact
        if: steps.sync.outputs.has_update == 'true'
        run: |
          ls -lh bin/*.jar
          sha256sum bin/*.jar

      - name: Create Release
        if: steps.sync.outputs.has_update == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          files: "bin/*.jar"
          body: |
            Auto-generated build from upstream release tag v${{ steps.version.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
